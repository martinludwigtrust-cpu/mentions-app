<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mentions.co.za</title>
<style>
  :root{--teal-50:#E1F5EE;--teal-100:#9FE1CB;--teal-400:#1D9E75;--teal-600:#0F6E56;--teal-800:#085041;--bg:#ffffff;--bg2:#F8F7F4;--text:#1a1a18;--text2:#5F5E5A;--text3:#888780;--border:rgba(0,0,0,0.1);--radius:10px;--radius-lg:14px;}
  @media(prefers-color-scheme:dark){:root{--bg:#1c1c1a;--bg2:#242422;--text:#e8e6df;--text2:#9e9c95;--text3:#666460;--border:rgba(255,255,255,0.1);}}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg2);color:var(--text);min-height:100vh;}
  .topbar{background:var(--bg);border-bottom:0.5px solid var(--border);padding:0 20px;height:48px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .wordmark{font-size:14px;font-weight:600;color:var(--teal-600);text-decoration:none;}
  .wordmark span{color:var(--teal-400);}
  .back{font-size:12px;color:var(--text3);text-decoration:none;}
  .back:hover{color:var(--teal-400);}
  .page{max-width:480px;margin:0 auto;padding:0 0 60px;}
  .hero{background:var(--teal-400);padding:24px 20px 48px;}
  .hero-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .hero-wordmark{font-size:11px;font-weight:500;color:#9FE1CB;letter-spacing:0.05em;}
  .sub-pill{background:#085041;color:#9FE1CB;font-size:10px;font-weight:500;padding:3px 9px;border-radius:20px;}
  .free-pill{background:rgba(0,0,0,0.2);color:#E1F5EE;font-size:10px;font-weight:500;padding:3px 9px;border-radius:20px;}
  .cat-pill{background:#0F6E56;color:#E1F5EE;font-size:11px;padding:3px 10px;border-radius:20px;display:inline-block;margin-top:8px;}
  .avatar-wrap{display:flex;justify-content:center;margin-top:-30px;margin-bottom:10px;}
  .avatar{width:64px;height:64px;border-radius:50%;background:#E1F5EE;border:3px solid var(--bg2);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;color:var(--teal-800);}
  .body{padding:0 20px 20px;background:var(--bg);}
  .biz-name{font-size:20px;font-weight:600;text-align:center;letter-spacing:-0.02em;margin:0 0 4px;}
  .biz-loc{font-size:13px;color:var(--text2);text-align:center;margin:0 0 16px;}
  .photo-slot{width:100%;height:120px;background:var(--teal-100);border-radius:var(--radius);margin-bottom:14px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--teal-800);overflow:hidden;}
  .photo-slot img{width:100%;height:100%;object-fit:cover;}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
  .stat{background:var(--bg2);border-radius:var(--radius);padding:10px 6px;text-align:center;}
  .stat-n{font-size:20px;font-weight:600;color:var(--teal-400);}
  .stat-l{font-size:10px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:0.04em;}
  .section-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin:14px 0 8px;}
  .about{font-size:13px;color:var(--text);line-height:1.65;background:var(--bg2);border-radius:var(--radius);padding:12px 14px;margin-bottom:14px;}
  .tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px;}
  .tag{background:var(--teal-50);color:var(--teal-800);font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;}
  .field{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--border);font-size:13px;}
  .field:last-of-type{border-bottom:none;}
  .field-icon{color:var(--teal-400);width:16px;font-size:15px;flex-shrink:0;}
  .field-lbl{color:var(--text2);width:70px;flex-shrink:0;}
  .field-val{color:var(--text);}
  .field-val a{color:var(--teal-600);text-decoration:none;}
  /* blurred for non-subscribers */
  .blurred{filter:blur(4px);user-select:none;pointer-events:none;}
  .lock-overlay{position:relative;}
  .lock-msg{text-align:center;font-size:12px;color:var(--teal-600);margin:10px 0 14px;padding:10px;background:var(--teal-50);border-radius:var(--radius);}
  .mentions-block{border:1px solid var(--teal-100);border-radius:var(--radius);padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:12px;}
  .m-count{font-size:26px;font-weight:600;color:var(--teal-400);line-height:1;}
  .m-label{font-size:11px;color:var(--teal-600);margin-top:2px;}
  .m-bars{flex:1;}
  .m-bar-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:10px;color:var(--text3);}
  .m-track{flex:1;height:4px;background:var(--bg2);border-radius:2px;overflow:hidden;}
  .m-fill{height:100%;background:var(--teal-400);border-radius:2px;}
  .cta-row{display:flex;gap:8px;margin-top:12px;}
  .cta-p{flex:1;padding:11px;font-size:13px;font-weight:600;background:var(--teal-400);color:white;border:none;border-radius:var(--radius);cursor:pointer;}
  .cta-p:hover{background:var(--teal-600);}
  .cta-s{flex:1;padding:11px;font-size:13px;font-weight:600;background:var(--bg2);color:var(--text);border:0.5px solid var(--border);border-radius:var(--radius);cursor:pointer;}
  .edit-link{font-size:12px;color:var(--text3);text-align:center;margin-top:12px;display:block;cursor:pointer;}
  .edit-link:hover{color:var(--teal-400);}
  .pg-footer{font-size:11px;color:var(--text3);text-align:center;padding:12px 0 4px;border-top:0.5px solid var(--border);margin-top:12px;}
  .loading{text-align:center;padding:60px 20px;color:var(--text3);font-size:14px;}
  .not-found{text-align:center;padding:60px 20px;}
  .not-found h2{font-size:18px;font-weight:600;margin-bottom:8px;}
  .not-found p{font-size:14px;color:var(--text2);}
</style>
</head>
<body>
<div class="topbar">
  <a class="wordmark" href="/">mentions<span>.co.za</span></a>
  <a class="back" href="/">← directory</a>
</div>
<div class="page" id="page">
  <div class="loading">Loading…</div>
</div>

<script>
const SUPABASE_URL = 'https://aplhpcwomndslvwqxyye.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFwbGhwY3dvbW5kc2x2d3F4eXllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNzYwNTYsImV4cCI6MjA5Nzk1MjA1Nn0.FMAZzxtAEHymjHjbuNvrSA0tAHu75c_G6xA_noFKJV4';

// Get slug from URL path: /v/blueworks → blueworks
const pathParts = window.location.pathname.replace(/\/+$/, '').split('/');
const slug = pathParts[pathParts.length - 1];
const townSlug = pathParts.length >= 3 ? pathParts[pathParts.length - 3] : 'plett';

const CAT_ICONS = {
  'Restaurants':'🍽','Groceries & Farm':'🛒','Services':'🔧','Arts & Shops':'🎨',
  'Pets & Care':'🐾','Community':'🌱','Tech':'📡','Health & Medical':'🏥','Other':'📌'
};

async function loadVendor() {
  const page = document.getElementById('page');

  if (!slug) {
    page.innerHTML = notFound();
    return;
  }

  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/contacts?slug=eq.${slug}&town_slug=eq.${townSlug}&limit=1`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    const data = await res.json();

    if (!data || data.length === 0) {
      page.innerHTML = notFound();
      return;
    }

    renderVendor(data[0]);
  } catch(e) {
    page.innerHTML = `<div class="loading">Error loading page. Please try again.</div>`;
  }
}

function renderVendor(c) {
  const page = document.getElementById('page');
  const isSub = c.is_subscriber;
  const initials = (c.name || '').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  const icon = CAT_ICONS[c.category] || '📌';
  const mentions = c.mentions || 1;
  const week = Math.max(1, Math.floor(mentions * 0.15));

  document.title = `${c.name} · mentions.co.za`;

  const months = ['Jun','May','Apr'];
  const vals = [Math.round(mentions*0.4), Math.round(mentions*0.35), Math.round(mentions*0.25)];
  const max = Math.max(...vals, 1);
  const bars = months.map((m,i) => `
    <div class="m-bar-row">
      <span style="width:26px">${m}</span>
      <div class="m-track"><div class="m-fill" style="width:${Math.round((vals[i]/max)*100)}%"></div></div>
      <span style="width:16px;text-align:right">${vals[i]}</span>
    </div>`).join('');

  const tags = (c.tags || [c.category]).map(t => `<span class="tag">${t}</span>`).join('');

  page.innerHTML = `
    <div class="hero">
      <div class="hero-top">
        <span class="hero-wordmark">mentions.co.za</span>
        ${isSub ? '<span class="sub-pill">★ subscriber</span>' : '<span class="free-pill">free listing</span>'}
      </div>
      <span class="cat-pill">${icon} ${c.category || 'Other'}</span>
    </div>
    <div class="avatar-wrap"><div class="avatar">${initials}</div></div>
    <div class="body">
      <p class="biz-name">${esc(c.name)}</p>
      <p class="biz-loc">📍 ${esc(c.address || 'Plettenberg Bay · Garden Route')}</p>

      <div class="photo-slot">
        ${c.photo_url ? `<img src="${c.photo_url}" alt="${esc(c.name)}">` : '📷 photo coming soon'}
      </div>

      <div class="stats">
        <div class="stat"><div class="stat-n">${mentions}</div><div class="stat-l">mentions</div></div>
        <div class="stat"><div class="stat-n ${isSub ? '' : 'blurred'}">4.8</div><div class="stat-l">sentiment</div></div>
        <div class="stat"><div class="stat-n ${isSub ? '' : 'blurred'}">${week}</div><div class="stat-l">this week</div></div>
      </div>

      <div class="mentions-block">
        <div>
          <div class="m-count">${mentions}</div>
          <div class="m-label">total mentions</div>
        </div>
        <div class="m-bars ${isSub ? '' : 'blurred'}">${bars}</div>
      </div>

      ${c.description ? `
        <div class="section-title">About</div>
        <div class="about ${isSub ? '' : 'blurred'}">${esc(c.description)}</div>
      ` : ''}

      ${tags ? `<div class="tags">${tags}</div>` : ''}

      <div class="section-title">Contact</div>
      ${c.phone ? `<div class="field"><span class="field-icon">📞</span><span class="field-lbl">Phone</span><span class="field-val"><a href="tel:${c.phone}">${esc(c.phone)}</a></span></div>` : ''}
      ${c.email ? `<div class="field"><span class="field-icon">✉️</span><span class="field-lbl">Email</span><span class="field-val ${isSub ? '' : 'blurred'}">${esc(c.email)}</span></div>` : ''}
      ${c.website ? `<div class="field"><span class="field-icon">🌐</span><span class="field-lbl">Website</span><span class="field-val ${isSub ? '' : 'blurred'}"><a href="${c.website}">${esc(c.website)}</a></span></div>` : ''}
      ${c.instagram ? `<div class="field"><span class="field-icon">📸</span><span class="field-lbl">Instagram</span><span class="field-val ${isSub ? '' : 'blurred'}">${esc(c.instagram)}</span></div>` : ''}

      ${!isSub ? `<div class="lock-msg">🔒 Subscribe to mentions.co.za to unlock full details, photos & contact info</div>` : ''}

      <div class="cta-row">
        ${c.phone ? `<button class="cta-p" onclick="location.href='tel:${c.phone}'">📞 Call now</button>` : '<button class="cta-p" onclick="copyLink()">📋 Copy link</button>'}
        ${c.phone ? `<button class="cta-s" onclick="window.open('https://wa.me/${(c.phone||'').replace(/\\D/g,'')}?text=Hi%2C+I+found+you+on+mentions.co.za','_blank')">💬 WhatsApp</button>` : ''}
      </div>

      <a class="edit-link" href="/vendor-edit.html?slug=${slug}">✏️ own this listing? update your details</a>

      <div class="pg-footer">mentions.co.za/${townSlug}/v/${slug} · ${c.category || ''} · Plettenberg Bay</div>
    </div>
  `;
}

function notFound() {
  return `<div class="not-found">
    <h2>Listing not found</h2>
    <p>This vendor hasn't been added to the directory yet.</p>
    <p style="margin-top:12px"><a href="/" style="color:#1D9E75">← Back to directory</a></p>
  </div>`;
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyLink() {
  navigator.clipboard.writeText(window.location.href);
}

loadVendor();
</script>
</body>
</html>
