<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mentions.co.za</title>
<style>
  :root{--t400:#1D9E75;--t600:#0F6E56;--t800:#085041;--t50:#E1F5EE;--t100:#9FE1CB;--bg:#fff;--bg2:#F8F7F4;--bg3:#F1EFE8;--text:#1a1a18;--text2:#5F5E5A;--text3:#888780;--bd:rgba(0,0,0,0.1);--bd2:rgba(0,0,0,0.18);--r:10px;--rl:14px;}
  @media(prefers-color-scheme:dark){:root{--bg:#1c1c1a;--bg2:#242422;--bg3:#2c2c2a;--text:#e8e6df;--text2:#9e9c95;--text3:#666460;--bd:rgba(255,255,255,0.1);--bd2:rgba(255,255,255,0.18);}}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg2);color:var(--text);min-height:100vh;}
  a{text-decoration:none;}
  .topbar{background:var(--bg);border-bottom:0.5px solid var(--bd);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .wordmark{font-size:15px;font-weight:600;color:var(--t600);letter-spacing:-0.02em;}
  .wordmark span{color:var(--t400);}
  .back{font-size:12px;color:var(--text3);}
  .back:hover{color:var(--t400);}
  .hero{background:var(--t400);padding:28px 20px 32px;}
  .hero-wordmark{font-size:11px;color:#9FE1CB;font-weight:500;letter-spacing:0.05em;margin-bottom:8px;}
  .hero-town{font-size:28px;font-weight:600;color:#fff;letter-spacing:-0.03em;margin-bottom:4px;}
  .hero-sub{font-size:13px;color:#9FE1CB;}
  .hero-stats{display:flex;gap:20px;margin-top:16px;}
  .hero-stat{text-align:center;}
  .hero-stat-n{font-size:22px;font-weight:600;color:#fff;letter-spacing:-0.03em;}
  .hero-stat-l{font-size:11px;color:#9FE1CB;margin-top:1px;}
  .search-bar{background:var(--bg);margin:0 20px;margin-top:-20px;border-radius:var(--rl);padding:12px 16px;display:flex;align-items:center;gap:10px;border:0.5px solid var(--bd2);box-shadow:0 2px 8px rgba(0,0,0,0.08);}
  .search-bar input{flex:1;font-size:14px;border:none;outline:none;background:transparent;color:var(--text);}
  .search-bar input::placeholder{color:var(--text3);}
  .main{max-width:680px;margin:0 auto;padding:24px 20px 60px;}
  .section-title{font-size:12px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin:24px 0 12px;}
  .cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:24px;}
  @media(min-width:480px){.cat-grid{grid-template-columns:repeat(4,1fr);}}
  .cat-card{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--r);padding:14px 12px;cursor:pointer;transition:border-color 0.12s,transform 0.1s;text-align:center;}
  .cat-card:hover{border-color:var(--t100);transform:translateY(-1px);}
  .cat-card.active{border-color:var(--t400);background:var(--t50);}
  .cat-icon{font-size:22px;margin-bottom:6px;}
  .cat-name{font-size:12px;font-weight:500;color:var(--text);}
  .cat-count{font-size:11px;color:var(--text3);margin-top:2px;}
  .vendor-grid{display:grid;grid-template-columns:1fr;gap:10px;}
  @media(min-width:480px){.vendor-grid{grid-template-columns:repeat(2,1fr);}}
  .vendor-card{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--r);padding:14px 16px;cursor:pointer;transition:border-color 0.12s;}
  .vendor-card:hover{border-color:var(--t100);}
  .vc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;}
  .vc-name{font-size:14px;font-weight:500;color:var(--text);line-height:1.3;}
  .vc-badge{font-size:10px;font-weight:500;padding:2px 7px;border-radius:8px;white-space:nowrap;flex-shrink:0;background:var(--t50);color:var(--t800);}
  .vc-sub-badge{background:#EEEDFE;color:#3C3489;}
  .vc-field{font-size:12px;color:var(--text2);margin-bottom:3px;}
  .vc-mentions{font-size:11px;font-weight:500;color:var(--t600);margin-top:6px;display:flex;align-items:center;gap:4px;}
  .vc-bar{flex:1;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;max-width:80px;}
  .vc-fill{height:100%;background:var(--t400);border-radius:2px;}
  .empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px;}
  .loading{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px;}
  .wa-btn{width:100%;padding:13px;background:var(--t400);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;margin-top:20px;display:flex;align-items:center;justify-content:center;gap:8px;transition:background 0.12s;}
  .wa-btn:hover{background:var(--t600);}
  .pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
  .pill{font-size:12px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--bd2);background:var(--bg);color:var(--text2);cursor:pointer;transition:all 0.1s;}
  .pill:hover{background:var(--bg3);}
  .pill.active{background:var(--t400);color:#fff;border-color:var(--t400);}
</style>
</head>
<body>
<div class="topbar">
  <a class="wordmark" href="/">mentions<span>.co.za</span></a>
  <a class="back" href="/">← all towns</a>
</div>

<div class="hero" id="hero">
  <div class="hero-wordmark">mentions.co.za</div>
  <div class="hero-town" id="hero-town">Loading…</div>
  <div class="hero-sub" id="hero-sub"></div>
  <div class="hero-stats" id="hero-stats"></div>
</div>

<div class="search-bar">
  <span style="color:var(--text3);font-size:16px">🔍</span>
  <input type="text" id="search-input" placeholder="search businesses…" oninput="filterVendors()">
</div>

<div class="main">
  <div class="section-title">browse by category</div>
  <div class="cat-grid" id="cat-grid"></div>

  <div class="section-title" id="vendors-title">all businesses</div>
  <div class="pills" id="sort-pills">
    <span class="pill active" onclick="setSort('mentions',this)">↗ most mentioned</span>
    <span class="pill" onclick="setSort('name',this)">A–Z</span>
    <span class="pill" onclick="setSort('recent',this)">recently added</span>
    <span class="pill" onclick="setSort('subscribers',this)">subscribers first</span>
  </div>
  <div id="vendors-out"><div class="loading">Loading businesses…</div></div>

  <button class="wa-btn" onclick="generateDigest()">💬 Generate WA digest for this town</button>
</div>

<script>
const SUPABASE_URL = 'https://aplhpcwomndslvwqxyye.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFwbGhwY3dvbW5kc2x2d3F4eXllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNzYwNTYsImV4cCI6MjA5Nzk1MjA1Nn0.FMAZzxtAEHymjHjbuNvrSA0tAHu75c_G6xA_noFKJV4';

const CAT_ICONS = {'Restaurants':'🍽','Groceries & Farm':'🛒','Services':'🔧','Arts & Shops':'🎨','Pets & Care':'🐾','Community':'🌱','Tech':'📡','Health & Medical':'🏥','Other':'📌'};
const CAT_ORDER = ['Restaurants','Groceries & Farm','Services','Arts & Shops','Pets & Care','Community','Tech','Health & Medical','Other'];

// Get town slug from URL: /plett → plett
const pathParts = window.location.pathname.replace(/\/+$/, '').split('/');
const townSlug = pathParts[pathParts.length - 1];

let allContacts = [];
let townData = null;
let activeCategory = null;
let currentSort = 'mentions';
let searchTerm = '';

async function init() {
  // Load town info
  const tr = await fetch(`${SUPABASE_URL}/rest/v1/towns?slug=eq.${townSlug}&limit=1`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  const towns = await tr.json();
  townData = towns[0];

  if (!townData) {
    document.getElementById('hero-town').textContent = townSlug;
    document.getElementById('hero-sub').textContent = 'Town not found';
  } else {
    document.title = `${townData.name} · mentions.co.za`;
    document.getElementById('hero-town').textContent = townData.name;
    document.getElementById('hero-sub').textContent = `${townData.province || ''} · ${townData.region || ''}`;
  }

  // Load contacts for this town
  const cr = await fetch(`${SUPABASE_URL}/rest/v1/contacts?town_slug=eq.${townSlug}&order=mentions.desc`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  allContacts = await cr.json();

  renderStats();
  renderCategories();
  renderVendors();
}

function renderStats() {
  const total = allContacts.length;
  const totalMentions = allContacts.reduce((s, c) => s + (c.mentions || 0), 0);
  const subscribers = allContacts.filter(c => c.is_subscriber).length;
  const cats = new Set(allContacts.map(c => c.category)).size;

  document.getElementById('hero-stats').innerHTML = `
    <div class="hero-stat"><div class="hero-stat-n">${total}</div><div class="hero-stat-l">businesses</div></div>
    <div class="hero-stat"><div class="hero-stat-n">${totalMentions}</div><div class="hero-stat-l">mentions</div></div>
    <div class="hero-stat"><div class="hero-stat-n">${cats}</div><div class="hero-stat-l">categories</div></div>
    <div class="hero-stat"><div class="hero-stat-n">${subscribers}</div><div class="hero-stat-l">subscribers</div></div>
  `;
}

function renderCategories() {
  const cats = {};
  allContacts.forEach(c => { const cat = c.category || 'Other'; cats[cat] = (cats[cat] || 0) + 1; });
  const sorted = CAT_ORDER.filter(c => cats[c]).concat(Object.keys(cats).filter(c => !CAT_ORDER.includes(c)));

  document.getElementById('cat-grid').innerHTML = sorted.map(cat => `
    <div class="cat-card ${activeCategory === cat ? 'active' : ''}" onclick="toggleCat('${cat.replace(/'/g,"\\'")}')">
      <div class="cat-icon">${CAT_ICONS[cat] || '📌'}</div>
      <div class="cat-name">${cat}</div>
      <div class="cat-count">${cats[cat]} listed</div>
    </div>
  `).join('');
}

function toggleCat(cat) {
  activeCategory = activeCategory === cat ? null : cat;
  renderCategories();
  renderVendors();
}

function setSort(sort, el) {
  currentSort = sort;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderVendors();
}

function filterVendors() {
  searchTerm = document.getElementById('search-input').value.toLowerCase();
  renderVendors();
}

function getFiltered() {
  let list = [...allContacts];
  if (activeCategory) list = list.filter(c => c.category === activeCategory);
  if (searchTerm) list = list.filter(c => (c.name || '').toLowerCase().includes(searchTerm) || (c.description || '').toLowerCase().includes(searchTerm) || (c.tags || []).some(t => t.toLowerCase().includes(searchTerm)));
  if (currentSort === 'mentions') list.sort((a, b) => (b.mentions || 0) - (a.mentions || 0));
  else if (currentSort === 'name') list.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
  else if (currentSort === 'recent') list.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  else if (currentSort === 'subscribers') list.sort((a, b) => (b.is_subscriber ? 1 : 0) - (a.is_subscriber ? 1 : 0) || (b.mentions || 0) - (a.mentions || 0));
  return list;
}

function renderVendors() {
  const list = getFiltered();
  const title = activeCategory ? `${CAT_ICONS[activeCategory] || ''} ${activeCategory}` : 'all businesses';
  document.getElementById('vendors-title').textContent = title + ` (${list.length})`;

  if (!list.length) {
    document.getElementById('vendors-out').innerHTML = `<div class="empty">No businesses found${activeCategory ? ' in this category' : ''}${searchTerm ? ' matching "' + esc(searchTerm) + '"' : ''}.</div>`;
    return;
  }

  const maxMentions = Math.max(...list.map(c => c.mentions || 0), 1);

  document.getElementById('vendors-out').innerHTML = `<div class="vendor-grid">${list.map(c => {
    const pct = Math.round(((c.mentions || 0) / maxMentions) * 100);
    return `<div class="vendor-card" onclick="location.href='/${townSlug}/v/${c.slug}'">
      <div class="vc-top">
        <div class="vc-name">${esc(c.name)}</div>
        ${c.is_subscriber ? '<span class="vc-badge vc-sub-badge">★ sub</span>' : '<span class="vc-badge">' + (c.category || 'Other').split('&')[0].trim() + '</span>'}
      </div>
      ${c.phone ? `<div class="vc-field">📞 ${esc(c.phone)}</div>` : ''}
      ${c.description ? `<div class="vc-field" style="font-style:italic;color:var(--text3)">${esc(c.description.slice(0, 60))}${c.description.length > 60 ? '…' : ''}</div>` : ''}
      <div class="vc-mentions">
        ↗ ${c.mentions || 0} mention${(c.mentions || 0) !== 1 ? 's' : ''}
        <div class="vc-bar"><div class="vc-fill" style="width:${pct}%"></div></div>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function generateDigest() {
  const list = getFiltered();
  const cats = {};
  list.forEach(c => { const cat = c.category || 'Other'; if (!cats[cat]) cats[cat] = []; cats[cat].push(c); });
  const date = new Date().toLocaleDateString('en-ZA', {day:'numeric', month:'short', year:'numeric'});
  const town = townData ? townData.name : townSlug;
  let msg = `*mentions.co.za · ${town} · ${date}*\n\n`;
  CAT_ORDER.filter(c => cats[c]).forEach(cat => {
    msg += `${CAT_ICONS[cat] || '📌'} *${cat}*\n`;
    cats[cat].forEach(c => { msg += `• ${c.name} — mentions.co.za/${townSlug}/v/${c.slug}\n`; });
    msg += '\n';
  });
  msg += `_Full directory at mentions.co.za/${townSlug}_`;
  navigator.clipboard.writeText(msg).then(() => {
    const btn = document.querySelector('.wa-btn');
    btn.textContent = '✓ Copied! Paste into WhatsApp';
    setTimeout(() => { btn.innerHTML = '💬 Generate WA digest for this town'; }, 3000);
  });
}

init();
</script>
</body>
</html>
